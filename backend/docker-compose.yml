services:
  postgres:
    image: postgres:15-alpine
    container_name: eventbook_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventbook
      POSTGRES_PASSWORD: eventbook
      POSTGRES_DB: eventbook
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eventbook -d eventbook']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventbook_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
    container_name: eventbook_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://eventbook:eventbook@postgres:5432/eventbook
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
