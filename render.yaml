services:
  # Backend Web Service
  - type: web
    name: eventbook-api
    env: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false # Paste your Forever-Free Neon.tech Postgres URL here
      - key: REDIS_URL
        sync: false # Paste your Forever-Free Upstash Redis URL here
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 10
      - key: POLLER_INTERVAL_MS
        value: 2000
      - key: SMTP_HOST
        value: smtp.sendgrid.net
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: apikey
      - key: SMTP_PASS
        sync: false # Paste your SendGrid API key here (from GitHub Student Pack)
      - key: EMAIL_FROM
        value: noreply@yourdomain.com
    healthCheckPath: /health
